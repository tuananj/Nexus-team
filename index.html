<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Login Portal</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <div class="login-card">
        <div class="card-header">
            <h2>Login</h2>
        </div>
        
        <div class="card-body">
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="mminh@gmail.com">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" value="12345678">
            </div>

            <button class="btn-login">Login</button>

            <div class="divider">
                <span>OR</span>
            </div>

            <button type="button" class="btn-nexus" onclick="triggerGoogleLogin()">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="G">
                Login with Nexus
            </button>

            <div class="card-footer">
                <a href="#">Create an account</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
